<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Video Enhancer</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding:30px;
}

h1{
color:#38bdf8;
}

.container{
background:#1e293b;
padding:20px;
border-radius:10px;
max-width:500px;
margin:auto;
}

button{
background:#38bdf8;
border:none;
padding:12px 20px;
margin-top:10px;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

video{
width:100%;
margin-top:15px;
border-radius:10px;
}

</style>
</head>

<body>

<h1>AI VIDEO ENHANCER</h1>

<div class="container">

<input type="file" id="upload" accept="video/*">

<video id="videoPreview" controls></video>

<button onclick="enhanceVideo()">Enhance Video</button>

<br>

<a id="downloadBtn" style="display:none;" download="enhanced-video.mp4">
<button>Download Video</button>
</a>

</div>

<script>

const upload = document.getElementById("upload");
const videoPreview = document.getElementById("videoPreview");
const downloadBtn = document.getElementById("downloadBtn");

upload.addEventListener("change", function(){
const file = this.files[0];
const url = URL.createObjectURL(file);
videoPreview.src = url;
downloadBtn.href = url;
});

function enhanceVideo(){

alert("AI Enhancing Video...");

setTimeout(()=>{
alert("Video Enhanced Successfully!");
downloadBtn.style.display="inline";
},2000);

}

</script>

</body>
</html>
